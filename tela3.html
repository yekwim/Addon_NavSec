<section class="screen screen--remediation">
  <button class="link-back" id="back-to-detail" type="button">
    <span aria-hidden="true">&lsaquo;</span> voltar
  </button>

  <h1 class="rem-title">Remediacao</h1>
  <p class="rem-sub" id="rem-sub">-</p>

  <span class="field__label">Versao atual</span>
  <div class="version-box version-box--bad">
    <span class="version-box__value" id="rem-current">-</span>
    <span class="version-box__tag">vulneravel</span>
  </div>

  <div class="version-arrow" aria-hidden="true">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14m0 0 6-6m-6 6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>

  <span class="field__label">Versao recomendada</span>
  <div class="version-box version-box--good">
    <span class="version-box__value" id="rem-recommended">-</span>
    <span class="version-box__tag">seguro</span>
  </div>

  <h2 class="section-title">Passos sugeridos</h2>
  <ol class="steps" id="rem-steps"></ol>

  <span class="field__label">Referencia</span>
  <div class="reference-card" id="rem-reference">-</div>
  <button class="btn-outline" id="open-reference" type="button">Abrir referencia oficial &nearr;</button>
</section>
