<section class="screen screen--detail">
  <button class="link-back" id="back-to-summary" type="button">
    <span aria-hidden="true">&lsaquo;</span> voltar
  </button>

  <div class="detail-head">
    <h1 class="detail-title" id="detail-name">-</h1>
    <span class="badge" id="detail-badge">-</span>
  </div>
  <p class="detail-version" id="detail-version">-</p>

  <div class="field">
    <span class="field__label">Identificador (CVE)</span>
    <div class="field__value field__value--mono field__value--accent" id="detail-cve">-</div>
  </div>

  <div class="field">
    <span class="field__label">Tipo de fraqueza (CWE)</span>
    <div class="field__value" id="detail-cwe">-</div>
  </div>

  <div class="field">
    <span class="field__label">Severidade (CVSS v3.1)</span>
    <div class="field__value field__value--score" id="detail-cvss">-</div>
  </div>

  <div class="field">
    <span class="field__label">Descricao</span>
    <div class="field__value field__value--multiline" id="detail-desc">-</div>
  </div>

  <button class="btn-primary" id="go-fix" type="button">Como corrigir &rarr;</button>
</section>
